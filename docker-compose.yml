services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "CivicPulse_Dev123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P CivicPulse_Dev123! -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/CivicPulse.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      USE_INMEMORY: "0"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=CivicPulse;User Id=sa;Password=CivicPulse_Dev123!;TrustServerCertificate=True"
      ConnectionStrings__Redis: "redis:6379"
      OpenAQ__ApiKey: "${OPENAQ_API_KEY}"
      Vapid__PublicKey: "${VAPID_PUBLIC_KEY}"
      Vapid__PrivateKey: "${VAPID_PRIVATE_KEY}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: src/CivicPulse.Web/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ApiBaseUrl: http://api:8080
    depends_on:
      - api

volumes:
  sqldata:
  redisdata:
